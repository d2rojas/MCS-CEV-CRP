version: 1.0
runtime: docker
build:
  commands:
    build:
      - echo "Building Green Construction MCS-CEV Optimization Backend API"
      - echo "Backend-only container with Julia optimization engine"
run:
  runtime-version: latest
  command: ./docker-start-backend.sh
  network:
    port: 3004
    env: PORT
  env:
    - name: PORT
      value: "3004"
    - name: NODE_ENV
      value: "production"
    - name: JULIA_PATH
      value: "/usr/local/julia/bin/julia"
    - name: JULIA_DEPOT_PATH
      value: "/opt/julia"
    - name: MAX_CONCURRENT_JOBS
      value: "3"
    - name: OPTIMIZATION_TIMEOUT
      value: "1800000"
    - name: MAX_FILE_SIZE
      value: "104857600"
    - name: JOB_CLEANUP_HOURS
      value: "24"
    - name: LOG_LEVEL
      value: "info"



